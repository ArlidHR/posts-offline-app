# ──────────────────────────────────────────────────────────────────────────────
# Android CI — Posts Offline App
#
# Runs on every pull-request targeting `main` and on every push to `main`.
#
# Pipeline stages (in order):
#   1. lint     → Static analysis with Android Lint
#   2. test     → JVM unit tests (no emulator required)
#   3. build    → Assemble debug APK to confirm the project compiles end-to-end
#
# Artifacts uploaded on every run:
#   • Lint HTML report
#   • Unit-test HTML + XML reports (always uploaded — also on failure)
#   • Debug APK
#
# Performance optimisations:
#   • Gradle home cache (keys off wrapper + build scripts)
#   • Build-output cache (keys off source files)
#   • `--build-cache` flag on every Gradle invocation
#   • `--parallel` and `--configuration-cache` for incremental CI runs
#
# Architecture: Clean Architecture + MVVM + Hilt + Room + Retrofit + Compose
# ──────────────────────────────────────────────────────────────────────────────

name: Android CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR to avoid wasting resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege permissions
permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  # Java version must match compileOptions in app/build.gradle.kts (VERSION_17)
  JAVA_VERSION: "17"
  # Gradle flags shared across all steps
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — LINT
  # Static analysis: detect code issues, missing resources, API level problems.
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Restore Gradle build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run Android Lint
        run: ./gradlew lintDebug --build-cache --parallel --continue

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — UNIT TESTS
  # JVM unit tests: UseCases, Repositories, ViewModels.
  # No emulator required — pure Kotlin/JVM.
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Restore Gradle build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --build-cache --parallel --continue

      - name: Publish test results summary (PR comment)
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Test Results
          path: "app/build/test-results/**/*.xml"
          reporter: java-junit
          fail-on-error: true

      - name: Upload test reports
        if: always() # upload even on failure so failures are inspectable
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — BUILD
  # Assembles the debug APK to guarantee the whole project compiles.
  # Depends on lint + test so the APK is only built when quality gates pass.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: "🏗️ Build Debug APK"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, test]

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Restore Gradle build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --build-cache --parallel

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — CI STATUS GATE
  # Single required check for branch-protection rules.
  # Set this as the only required status check in GitHub → Settings → Branches.
  # ────────────────────────────────────────────────────────────────────────────
  ci-status:
    name: "✅ CI Passed"
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint job failed or was skipped"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Unit tests job failed or was skipped"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build job failed or was skipped"
            exit 1
          fi
          echo "✅ All CI checks passed — safe to merge"

